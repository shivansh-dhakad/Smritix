<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Smritix — Capture · Organize · Create</title>
  <link rel="stylesheet" href="/static/css/main.css" />
  <link rel="icon" href="/static/images/logo.png" />
</head>

<body>

  <div id="toast-container"></div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-box"></div>
  </div>

  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <img src="/static/images/logo.png" class="sidebar-logo" alt="Smritix" />
        <span class="sidebar-brand">Smritix</span>
        <button class="sidebar-toggle" id="sidebar-toggle" title="Collapse">‹</button>
      </div>
      <div class="sidebar-search">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search… (Ctrl+K)" autocomplete="off" />
        <span class="search-shortcut"></span>
        <div id="search-dropdown"></div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <div style="padding:10px;font-size:.78rem;color:var(--t3)">Loading…</div>
      </nav>
      <div class="sidebar-footer">
        <button class="sidebar-footer-btn" onclick="window._goDash()" title="Dashboard">🏠 <span>Dashboard</span></button>
        <button class="sidebar-footer-btn" onclick="window._doBackup()" title="Backup">💾 <span>Backup</span></button>
      </div>
    </aside>

    <div id="main">
      <div id="topbar">
        <div class="breadcrumb" id="breadcrumb">
          <span class="breadcrumb-item active">🏠 Dashboard</span>
        </div>
        <div class="topbar-actions" id="topbar-actions"></div>
      </div>
      <div id="content">
        <div class="empty-state" style="margin-top:100px">
          <div class="spin" style="font-size:2rem;color:var(--accent)">⟳</div>
          <div class="empty-state-title" style="margin-top:12px">Loading Smritix…</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/static/js/app.js"></script>
</body>

</html>
